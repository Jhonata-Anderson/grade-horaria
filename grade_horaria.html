<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Grade Horária — Direito</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0C0E1A;
    --surface: #13162A;
    --border: #1E2240;
    --text: #E8EAFF;
    --muted: #5A6080;
    --accent: #7C5CFF;
    --accent2: #3B82F6;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', system-ui, sans-serif;
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    -webkit-tap-highlight-color: transparent;
  }

  /* HEADER */
  .header {
    padding: 36px 20px 24px;
    background: linear-gradient(160deg, #16193A 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, #7C5CFF22 0%, transparent 70%);
    border-radius: 50%;
  }
  .header-inner { display: flex; align-items: center; gap: 14px; position: relative; }
  .logo {
    width: 52px; height: 52px;
    border-radius: 15px;
    background: linear-gradient(135deg, #7C5CFF, #3B82F6);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    box-shadow: 0 6px 24px #7C5CFF45;
    flex-shrink: 0;
  }
  .header-text h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 22px; font-weight: 900;
    color: #fff; letter-spacing: -0.3px;
  }
  .header-text p { font-size: 13px; color: var(--muted); margin-top: 2px; letter-spacing: 0.3px; }

  /* TABS */
  .tabs {
    display: flex; gap: 8px;
    padding: 14px 16px;
    background: var(--bg);
    position: sticky; top: 0; z-index: 100;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    flex: 1;
    padding: 10px 4px 8px;
    border-radius: 11px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.4px;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    transition: all 0.2s ease;
    -webkit-appearance: none;
    touch-action: manipulation;
  }
  .tab.active {
    background: linear-gradient(135deg, #7C5CFF18, #3B82F618);
    border-color: #7C5CFF55;
    color: #A78BFA;
  }
  .tab-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #7C5CFF;
    display: none;
  }
  .tab.today .tab-dot { display: block; }

  /* DAY HEADER */
  .day-header {
    padding: 22px 20px 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .day-name {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 28px; font-weight: 900; color: #fff;
  }
  .today-badge {
    font-size: 11px; font-weight: 600;
    color: var(--accent);
    background: #7C5CFF18;
    border: 1px solid #7C5CFF40;
    padding: 3px 11px; border-radius: 20px;
  }

  /* CLASSES */
  .list { padding: 8px 16px 20px; display: flex; flex-direction: column; gap: 12px; }

  .card {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    display: flex; overflow: hidden;
    animation: fadeUp 0.3s ease both;
  }
  .card-accent { width: 5px; flex-shrink: 0; }
  .card-body { padding: 16px; flex: 1; }

  .time-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 600;
    padding: 4px 10px; border-radius: 8px;
    border: 1px solid;
    margin-bottom: 10px;
    font-family: 'DM Sans', sans-serif;
  }
  .subject-name {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 17px; font-weight: 700;
    color: #EAECFF; line-height: 1.3;
    margin-bottom: 3px;
  }
  .subject-tag {
    font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1.2px;
    margin-bottom: 8px;
  }
  .prof {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: #9CA3AF; font-style: italic;
    margin-top: 6px;
  }

  /* FOOTER SUMMARY */
  .footer {
    padding: 16px 20px 36px;
    background: #0A0C16;
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-around;
  }
  .footer-day { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .footer-label { font-size: 10px; color: var(--muted); font-weight: 600; letter-spacing: 0.5px; }
  .footer-pips { display: flex; flex-direction: column; gap: 3px; align-items: center; }
  .pip { width: 8px; height: 8px; border-radius: 50%; opacity: 0.85; }

  /* EMPTY STATE */
  .empty {
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 15px;
    line-height: 1.6;
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">⚖️</div>
    <div class="header-text">
      <h1>Grade Horária</h1>
      <p>Curso de Direito</p>
    </div>
  </div>
</div>

<div class="tabs" id="tabs"></div>

<div class="day-header">
  <span class="day-name" id="dayName"></span>
  <span class="today-badge" id="todayBadge" style="display:none">Hoje</span>
</div>

<div class="list" id="classList"></div>

<div class="footer" id="footer"></div>

<script>
const schedule = {
  SEG: {
    label: "Segunda",
    classes: [
      { time: "20:30 – 22:00", subject: "Tópicos Integradores I", tag: "Direito", color: "#7C5CFF" }
    ]
  },
  TER: {
    label: "Terça",
    classes: [
      { time: "19:00 – 20:30", subject: "Direito Eleitoral", tag: "Direito", prof: "Prof. Fernanda Rodrigues", color: "#FF6B6B" },
      { time: "20:30 – 22:00", subject: "Direito das Sucessões", tag: "Direito", prof: "Prof. Roberta", color: "#FF9F43" }
    ]
  },
  QUA: {
    label: "Quarta",
    classes: [
      { time: "19:45 – 22:00", subject: "Estágio Supervisionado I", tag: "Direito", color: "#26C6DA" }
    ]
  },
  QUI: {
    label: "Quinta",
    classes: [
      { time: "18:15 – 20:30", subject: "Prática Forense Civil", tag: "Direito", prof: "Prof. Arthur", color: "#66BB6A" },
      { time: "20:30 – 22:00", subject: "Procedimentos no Âmbito da Administração", tag: "Direito", color: "#AB47BC" }
    ]
  },
  SEX: {
    label: "Sexta",
    classes: [
      { time: "18:15 – 19:00", subject: "Direito Individual e Coletivo do Trabalho", tag: "Direito", color: "#FFA726" },
      { time: "19:00 – 20:30", subject: "Legislação Penal e Processual Penal Especial", tag: "Direito", color: "#EF5350" },
      { time: "20:30 – 22:00", subject: "Direito Individual e Coletivo do Trabalho", tag: "Direito", color: "#FFA726" }
    ]
  }
};

const dayKeys = ["SEG","TER","QUA","QUI","SEX"];
const jsDayMap = {1:"SEG",2:"TER",3:"QUA",4:"QUI",5:"SEX"};
const todayKey = jsDayMap[new Date().getDay()] || "SEG";
let activeKey = todayKey;

function renderTabs() {
  const container = document.getElementById("tabs");
  container.innerHTML = "";
  dayKeys.forEach(key => {
    const btn = document.createElement("button");
    btn.className = "tab" + (key === activeKey ? " active" : "") + (key === todayKey ? " today" : "");
    btn.innerHTML = `${key}<span class="tab-dot"></span>`;
    btn.onclick = () => { activeKey = key; render(); };
    container.appendChild(btn);
  });
}

function renderDay() {
  const day = schedule[activeKey];
  document.getElementById("dayName").textContent = day.label;
  document.getElementById("todayBadge").style.display = activeKey === todayKey ? "inline-flex" : "none";

  const list = document.getElementById("classList");
  list.innerHTML = "";

  if (!day.classes.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📭</div>Sem aulas neste dia.</div>`;
    return;
  }

  day.classes.forEach((cls, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = `${i * 80}ms`;
    card.innerHTML = `
      <div class="card-accent" style="background:${cls.color}"></div>
      <div class="card-body">
        <div class="time-badge" style="color:${cls.color};border-color:${cls.color}40;background:${cls.color}15">
          🕐 ${cls.time}
        </div>
        <div class="subject-name">${cls.subject}</div>
        <div class="subject-tag">${cls.tag}</div>
        ${cls.prof ? `<div class="prof">👤 ${cls.prof}</div>` : ""}
      </div>
    `;
    list.appendChild(card);
  });
}

function renderFooter() {
  const footer = document.getElementById("footer");
  footer.innerHTML = "";
  dayKeys.forEach(key => {
    const day = schedule[key];
    const pips = day.classes.map(c => `<div class="pip" style="background:${c.color}"></div>`).join("");
    footer.innerHTML += `
      <div class="footer-day">
        <span class="footer-label">${key}</span>
        <div class="footer-pips">${pips}</div>
      </div>
    `;
  });
}

function render() {
  renderTabs();
  renderDay();
  renderFooter();
}

render();
</script>
</body>
</html>
